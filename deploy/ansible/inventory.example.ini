; Example inventory for the SimpleSIEM agent rollout playbook.
; Replace the host entries and run with:
;   ansible-playbook -i deploy/ansible/inventory.example.ini deploy/ansible/playbook.yml \
;       -e simplesiem_server_url=https://siem.example.com:9443 \
;       -e simplesiem_enrol_key=...

[simplesiem_agents]
host01 ansible_host=10.0.0.11
host02 ansible_host=10.0.0.12
host03 ansible_host=10.0.0.13

; If you operate multiple realms, group them here so you can roll one
; realm at a time.
[simplesiem_agents:vars]
simplesiem_realm=
