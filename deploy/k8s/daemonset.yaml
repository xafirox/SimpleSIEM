# SimpleSIEM Kubernetes DaemonSet — runs one agent per node, watching
# the host's /var/log, /tmp, /home, /etc, and host network sockets via
# /proc.  Reports back to a SimpleSIEM server reachable from the cluster.
#
# Apply:
#   kubectl create namespace simplesiem
#   kubectl -n simplesiem create secret generic simplesiem-enrol \
#       --from-literal=psk="$(ssh siem 'sudo simplesiem certs psk show')"
#   kubectl -n simplesiem apply -f deploy/k8s/configmap.yaml
#   kubectl -n simplesiem apply -f deploy/k8s/daemonset.yaml
#
# Scope warning: this manifest mounts the host's filesystem and uses the
# host network namespace.  That is intentional — a kernel-isolated agent
# can't see host syscalls or sockets.  Do not deploy this to a cluster
# you don't fully own.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: simplesiem-agent
  labels:
    app.kubernetes.io/name: simplesiem
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: simplesiem
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: simplesiem
        app.kubernetes.io/component: agent
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      serviceAccountName: simplesiem-agent
      containers:
        - name: agent
          image: ghcr.io/ota-jake/simplesiem:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/simplesiem
            - run
            - --config
            - /etc/simplesiem/config.json
          env:
            - name: SIMPLESIEM_AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SIMPLESIEM_ENROL_KEY
              valueFrom:
                secretKeyRef:
                  name: simplesiem-enrol
                  key: psk
          securityContext:
            # The agent reads /proc/<pid>/* and host log paths owned by
            # root.  Drop the kernel-modifying caps but keep what we need.
            privileged: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add: ["SYS_PTRACE", "DAC_READ_SEARCH", "NET_ADMIN"]
              drop: ["SYS_ADMIN", "SYS_MODULE"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /etc/simplesiem
              readOnly: true
            - name: logs
              mountPath: /var/log/simplesiem
            - name: state
              mountPath: /var/lib/simplesiem
            - name: host-var-log
              mountPath: /host/var/log
              readOnly: true
            - name: host-tmp
              mountPath: /host/tmp
              readOnly: true
            - name: host-etc
              mountPath: /host/etc
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: simplesiem-config
        - name: logs
          hostPath:
            path: /var/log/simplesiem
            type: DirectoryOrCreate
        - name: state
          hostPath:
            path: /var/lib/simplesiem
            type: DirectoryOrCreate
        - name: host-var-log
          hostPath:
            path: /var/log
            type: Directory
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
        - name: host-etc
          hostPath:
            path: /etc
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: simplesiem-agent
